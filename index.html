<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stamp Booth</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ffd6e0, #d6f0ff);
  text-align: center;
  padding: 20px;
}

h1 { color: #ff6b9a; }

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  max-width: 400px;
  margin: auto;
}

.booth {
  background: white;
  padding: 15px;
  border-radius: 20px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
  text-align: center;
}

.booth img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 10px;
}

.checked {
  background: #c8ffd4;
}

.progress {
  margin-top: 20px;
  font-size: 20px;
}

.reset-btn {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff6b9a;
  color: white;
}
</style>
</head>

<body>

<h1>☕ สะสมแต้ม ☕</h1>

<div class="grid">

  <div class="booth" id="seahorse">
    <img src="logo1.png">
    <div>The secret life of seahorses</div>
  </div>

  <div class="booth" id="plague">
    <img src="logo2.png">
    <div>Plague escape</div>
  </div>

  <div class="booth" id="mulberry">
    <img src="logo3.png">
    <div>The Craft of Mulberry</div>
  </div>

  <div class="booth" id="costume">
    <img src="logo4.png">
    <div>เครื่องแต่งแห่ยุคศึก</div>
  </div>

</div>

<div class="progress" id="progress">0 / 4</div>

<button class="reset-btn" onclick="resetProgress()">🔄 รีเซ็ต</button>

<script>
const params = new URLSearchParams(window.location.search);
const booth = params.get("booth");

let visited = JSON.parse(localStorage.getItem("visited") || "[]");

if (booth && !visited.includes(booth)) {
  visited.push(booth);
  localStorage.setItem("visited", JSON.stringify(visited));
}

function render() {
  let count = 0;

  document.querySelectorAll('.booth').forEach(el => {
    el.classList.remove('checked');
  });

  visited.forEach(b => {
    const el = document.getElementById(b);
    if (el) {
      el.classList.add("checked");
      count++;
    }
  });

  document.getElementById("progress").innerText = `${count} / 4`;
}

function resetProgress() {
  localStorage.removeItem("visited");
  visited = [];
  render();
}

render();
</script>

</body>
</html>
