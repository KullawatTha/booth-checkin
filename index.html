<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stamp Booth</title>

<style>
body {
  font-family: Arial;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a 70%);
  color: white;
  text-align: center;
  padding: 20px;
  overflow-x: hidden;
}

/* ดาวพื้นหลัง */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  opacity: 0.4;
  z-index: -1;
}

h1 {
  color: #a78bfa;
  text-shadow: 0 0 10px #a78bfa, 0 0 20px #6366f1;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  max-width: 500px;
  margin: auto;
}

.booth {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 15px rgba(167,139,250,0.3);
  transition: 0.3s;
}

.booth:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(167,139,250,0.7);
}

.booth img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 10px;
}

.checked {
  background: rgba(34,197,94,0.2);
  box-shadow: 0 0 20px #22c55e;
}

.progress {
  margin-top: 20px;
  font-size: 20px;
  color: #c4b5fd;
}

.reset-btn {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(45deg, #6366f1, #a78bfa);
  color: white;
  cursor: pointer;
  box-shadow: 0 0 15px #6366f1;
}

.reset-btn:hover {
  transform: scale(1.1);
}
</style></head>

<body>

<h1>☕ สะสมแต้ม ☕</h1>

<div class="grid">

  <div class="booth" id="seahorse"><img src="logo1.png?v=2"><div>The secret life of seahorses</div></div>
  <div class="booth" id="plague"><img src="logo2.png?v=2"><div>Plague escape</div></div>
  <div class="booth" id="mulberry"><img src="logo3.png?v=2"><div>The Craft of Mulberry</div></div>
  <div class="booth" id="costume"><img src="logo4.png?v=2"><div>เครื่องแต่งแห่ยุคศึก</div></div>

  <div class="booth" id="gold"><img src="logo5.png?v=2"><div>Gold jewelry Stories</div></div>
  <div class="booth" id="choco"><img src="logo6.png?v=2"><div>Chocolate Making</div></div>
  <div class="booth" id="body"><img src="logo7.png?v=2"><div>Body Language</div></div>
  <div class="booth" id="soccer"><img src="logo8.png?v=2"><div>Make a Soccer Ball</div></div>
  <div class="booth" id="blue"><img src="logo9.png?v=2"><div>Alone in the Blue</div></div>
  <div class="booth" id="roblox"><img src="logo10.png?v=2"><div>YNAC ROBLOX</div></div>
  <div class="booth" id="baby"><img src="logo11.png?v=2"><div>The Baby Piercing</div></div>
  <div class="booth" id="jt"><img src="logo12.png?v=2"><div>J&T</div></div>
  <div class="booth" id="spook"><img src="logo13.png?v=2"><div>ESCAPE FROM THAI SPOOK MUSEUM</div></div>

</div>

<div class="progress" id="progress">0 / 13</div>

<button class="reset-btn" onclick="resetProgress()">🔄 รีเซ็ต</button>

<script>
const params = new URLSearchParams(window.location.search);
const booth = params.get("booth");

let visited = JSON.parse(localStorage.getItem("visited") || "[]");

if (booth && !visited.includes(booth)) {
  visited.push(booth);
  localStorage.setItem("visited", JSON.stringify(visited));
}

function render() {
  let count = 0;

  document.querySelectorAll('.booth').forEach(el => {
    el.classList.remove('checked');
  });

  visited.forEach(b => {
    const el = document.getElementById(b);
    if (el) {
      el.classList.add("checked");
      count++;
    }
  });

  document.getElementById("progress").innerText = `${count} / 13`;
}

function resetProgress() {
  localStorage.removeItem("visited");
  visited = [];
  render();
}

render();
</script>

</body>
</html>
