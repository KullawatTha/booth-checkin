<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>QR Booth Galaxy</title>

<style>
body {
  font-family: Arial;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color: white;
  text-align: center;
  padding: 20px;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  opacity: 0.4;
  z-index: -1;
}

h1 {
  color: #a78bfa;
  text-shadow: 0 0 10px #a78bfa;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 800px;
  margin: auto;
}

.item {
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 15px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 15px rgba(167,139,250,0.3);
}

img {
  width: 130px;
  border-radius: 10px;
  background: white;
  padding: 5px;
}

.name {
  margin-top: 10px;
  font-size: 13px;
  color: #e0e7ff;
}
</style>
</head>

<body>

<h1>🌌 Scan QR เพื่อเช็คอิน 🌌</h1>

<div class="grid">

<div class="item">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://kullawattha.github.io/booth-checkin/?booth=seahorse">

</div>
