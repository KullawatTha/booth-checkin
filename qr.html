<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>QR Booth Galaxy</title>

<style>
body {
  font-family: Arial;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color: white;
  text-align: center;
  padding: 20px;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  opacity: 0.4;
  z-index: -1;
}

h1 {
  color: #a78bfa;
  text-shadow: 0 0 15px #a78bfa;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 900px;
  margin: auto;
}

.item {
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 15px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 15px rgba(167,139,250,0.3);
}

/* ===== QR + BG LOGO ===== */
.qr-box {
  position: relative;
  width: 150px;
  height: 150px;
  margin: auto;
  border-radius: 12px;
  overflow: hidden;
  background: white;
}

/* โลโก้พื้นหลัง */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.2;
  filter: blur(2px);
}

/* QR ด้านบน */
.qr {
  position: relative;
  width: 100%;
  padding: 10px; /* ขอบช่วยให้สแกนง่าย */
}

.name {
  margin-top: 10px;
  font-size: 13px;
  color: #e0e7ff;
}
</style>
</head>
